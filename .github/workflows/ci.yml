name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      SOLC_VERSION: "0.6.11"
      SOLC_SHA256: "2e091d5f13bea0bc445c7f674d5cf8c9e42a3d4e35e1e50f00f4dd44898505aa"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.7"

      - name: Install solc
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/solc "https://github.com/ethereum/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux"
          echo "${SOLC_SHA256}  /tmp/solc" | sha256sum -c -
          chmod +x /tmp/solc
          sudo mv /tmp/solc /usr/local/bin/solc
          solc --version

      - name: Build and test
        run: make

      - name: Verify files are unchanged
        run: git diff --exit-code
